services:
  postgres:
    image: postgres:16-alpine
    container_name: releasehub360_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: releasehub
      POSTGRES_PASSWORD: password
      POSTGRES_DB: releasehub360
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U releasehub -d releasehub360']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
