apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "releasehub360.labels" . | nindent 4 }}
type: Opaque
stringData:
  JWT_SECRET:         {{ .Values.secrets.jwtSecret | quote }}
  JWT_REFRESH_SECRET: {{ .Values.secrets.jwtRefreshSecret | quote }}
  N8N_AUTH_TOKEN:     {{ .Values.secrets.n8nAuthToken | quote }}
  TFS_PAT_TOKEN:      {{ .Values.secrets.tfsPat | quote }}
