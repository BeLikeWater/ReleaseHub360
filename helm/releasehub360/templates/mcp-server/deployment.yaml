apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-server
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "releasehub360.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcp-server
spec:
  replicas: {{ .Values.mcpServer.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: mcp-server
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mcp-server
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: mcp-server
    spec:
      containers:
        - name: mcp-server
          image: "{{ .Values.images.mcpServer.repository }}:{{ .Values.images.mcpServer.tag }}"
          imagePullPolicy: {{ .Values.images.mcpServer.pullPolicy }}
          ports:
            - containerPort: {{ .Values.mcpServer.port }}
              protocol: TCP
          env:
            - name: TFS_ORG_URL
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: TFS_ORG_URL
            - name: TFS_PAT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: TFS_PAT_TOKEN
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.mcpServer.port }}
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.mcpServer.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
