apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: n8n-data
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "releasehub360.labels" . | nindent 4 }}
    app.kubernetes.io/component: n8n
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.n8n.storage }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "releasehub360.labels" . | nindent 4 }}
    app.kubernetes.io/component: n8n
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: n8n
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: n8n
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: n8n
    spec:
      containers:
        - name: n8n
          image: {{ .Values.n8n.image }}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: {{ .Values.n8n.port }}
              protocol: TCP
          env:
            - name: N8N_HOST
              value: "0.0.0.0"
            - name: N8N_PORT
              value: {{ .Values.n8n.port | quote }}
            - name: N8N_PROTOCOL
              value: "http"
            - name: WEBHOOK_URL
              value: "http://n8n:{{ .Values.n8n.port }}"
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.n8n.port }}
            initialDelaySeconds: 30
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.n8n.port }}
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: n8n-data
              mountPath: /home/node/.n8n
      volumes:
        - name: n8n-data
          persistentVolumeClaim:
            claimName: n8n-data
